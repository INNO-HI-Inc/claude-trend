<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-trends — Claude Code 도구 주간 인덱스</title>
<meta name="description" content="Claude Code 쓰는 사람들을 위한 주간 도구 인덱스. 에이전트, 스킬, 하네스, MCP를 GitHub과 개발자 커뮤니티에서 매주 모아 정리합니다." />
<meta name="theme-color" content="#fbfaf6" />

<meta property="og:type" content="website" />
<meta property="og:title" content="cc-trends — Claude Code 도구 주간 인덱스" />
<meta property="og:description" content="에이전트, 스킬, 하네스, MCP를 매주 모아 정리하는 Claude Code 도구 인덱스." />
<meta property="og:url" content="https://inno-hi-inc.github.io/claude-trend/" />
<meta property="og:locale" content="ko_KR" />

<link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%23fbfaf6"/><circle cx="16" cy="16" r="10" fill="%23ff7657"/></svg>' />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="hero">
  <a class="brand-chip" href="https://claude.com/code" target="_blank" rel="noopener">
    <svg class="brand-mark" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2 L13.8 10.2 L22 12 L13.8 13.8 L12 22 L10.2 13.8 L2 12 L10.2 10.2 Z" fill="#cc785c"/>
    </svg>
    <span>Claude Code</span>
  </a>
  <h1>이번 주 Claude Code에서<br/>뭐가 <em class="hl-mint">뜨고</em>, 뭐가 이미 <em class="hl-lemon">자리잡았나</em>.</h1>
  <p class="subtitle">
    GitHub과 개발자 커뮤니티(HN, Reddit, dev.to, GeekNews, velog)에서 매주 수집한 <strong>에이전트 · 스킬 · 하네스 · MCP</strong> 주간 인덱스.
  </p>
  <div class="hero-stats">
    <span><strong id="inline-total">0</strong>개 프로젝트</span>
    <span class="dot">·</span>
    <span>이 중 <strong id="inline-rising">0</strong>개가 이번 주 급상승</span>
    <span class="dot">·</span>
    <span id="inline-updated">매주 월요일 갱신</span>
  </div>
</header>

<nav class="controls">
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="rising" role="tab" aria-selected="true">
      <span class="tab-emoji">🔥</span>
      <span>이번 주 뜨는</span>
      <span class="tab-count" id="rising-count">0</span>
    </button>
    <button class="tab" data-tab="classic" role="tab" aria-selected="false">
      <span class="tab-emoji">⭐</span>
      <span>이미 유명한</span>
      <span class="tab-count" id="classic-count">0</span>
    </button>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input type="search" id="search" placeholder="프로젝트, 저장소, 태그 검색" aria-label="검색" />
  </div>
</nav>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" data-close aria-label="close">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>
  <span class="foot-brand">cc-trends</span>
  <span>주간 수집 · 수동 큐레이션</span>
  <a href="https://github.com/INNO-HI-Inc/claude-trend" target="_blank" rel="noopener">GitHub ↗</a>
</footer>

<script src="app.js"></script>
</body>
</html>
