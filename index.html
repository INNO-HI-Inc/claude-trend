<body>
<div class="ticker" aria-hidden="true">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<header class="hero">
  <div class="logo-row">
    <span class="dot"></span>
    <span class="brand">CC Trends</span>
  </div>
  <h1>
    지금 <em class="hl-mint">뜨는</em> 것들,<br/>
    이미 <em class="hl-lemon">거대해진</em> 것들.
    <span class="arrow-icon">↗</span>
  </h1>
  <p class="subtitle">매주 GitHub · HackerNews · Reddit · dev.to · GeekNews · velog를 긁어서 정리하는 Claude Code 에이전트 · 스킬 · 하네스 · MCP 트렌드 피드.</p>
  <div class="meta-row">
    <span id="updated-at" class="meta-chip">—</span>

    <span class="meta-chip live">LIVE</span>
  </div>

<section class="stats" aria-label="통계">

    <div class="stat-num" id="stat-rising">0</div>

  <div class="stat">

  </div>
  <div class="stat">
    <div class="stat-num" id="stat-kr">0</div>
    <div class="stat-label">🇰🇷 한국어 지원</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-new">0</div>
    <div class="stat-label">🆕 30일내 신상</div>
  </div>
</section>

<nav class="controls">
  <div class="controls-inner">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="rising" role="tab" aria-selected="true">
        <span>🔥 최근 화제</span>
        <span class="tab-count" id="rising-count">0</span>
      </button>
      <button class="tab" data-tab="classic" role="tab" aria-selected="false">
        <span>⭐ 이미 유명한 것들</span>
        <span class="tab-count" id="classic-count">0</span>

      <input type="search" id="search" placeholder="검색: 프로젝트, 저장소, 태그" aria-label="검색" />
    </div>
  </div>
  <div class="filter-row" id="category-filter">
    <button data-cat="all" class="chip active">전체</button>
    <button data-cat="agent" class="chip">agent</button>
    <button data-cat="skill" class="chip">skill</button>
    <button data-cat="harness" class="chip">harness</button>
    <button data-cat="mcp" class="chip">MCP</button>

<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" data-close aria-label="닫기">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
